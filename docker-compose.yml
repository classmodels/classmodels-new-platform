# Lokale stack voor ontwikkeling & test — NIET automatisch op productie.
# MySQL poort 3307 om conflict met bestaande lokale MySQL te vermijden.

services:
  mysql:
    image: mysql:8.4
    container_name: cm-new-mysql
    environment:
      MYSQL_DATABASE: classmodels
      MYSQL_USER: cmuser
      MYSQL_PASSWORD: cmpass
      MYSQL_ROOT_PASSWORD: cmrootpass
    ports:
      - "3307:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - cm_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-pcmrootpass"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: cm-new-redis
    ports:
      - "6380:6379"

volumes:
  cm_mysql_data:
