# Lokale stack voor ontwikkeling & test — NIET automatisch op productie.
# PostgreSQL poort 5433 om conflict met bestaande lokale Postgres te vermijden.

services:
  postgres:
    image: postgres:16-alpine
    container_name: cm-new-postgres
    environment:
      POSTGRES_USER: cmuser
      POSTGRES_PASSWORD: cmpass
      POSTGRES_DB: classmodels
    ports:
      - "5433:5432"
    volumes:
      - cm_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmuser -d classmodels"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cm-new-redis
    ports:
      - "6380:6379"

volumes:
  cm_pg_data:
